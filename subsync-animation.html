<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SubSync</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0a0a0f;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
  }

  .scene {
    position: relative;
    display: flex;
    flex-direction: row;
    align-items: center;
    justify-content: center;
    gap: 28px;
  }

  /* BRAND */
  .brand {
    position: relative;
    font-family: "Syne", sans-serif;
    font-size: clamp(48px, 7vw, 82px);
    font-weight: 800;
    color: #fff;
    letter-spacing: -2px;
    display: flex;
    align-items: center;
    user-select: none;
    overflow: visible;
  }

  .brand .letter {
    display: inline-block;
    opacity: 0;
    transform: translateY(28px);
    animation: dropIn 0.06s ease forwards;
  }
  .brand .letter:nth-child(1) { animation-delay: 0.05s; }
  .brand .letter:nth-child(2) { animation-delay: 0.13s; }
  .brand .letter:nth-child(3) { animation-delay: 0.21s; }
  .brand .letter:nth-child(4) { animation-delay: 0.29s; }
  .brand .letter:nth-child(5) { animation-delay: 0.37s; }
  .brand .letter:nth-child(6) { animation-delay: 0.45s; }
  .brand .letter:nth-child(7) { animation-delay: 0.53s; }

  @keyframes dropIn {
    to { opacity: 1; transform: translateY(0); }
  }

  /* PLANE */
  .plane {
    position: absolute;
    width: 58px;
    height: auto;
    top: 50%;
    left: 0;
    opacity: 0;
    filter: drop-shadow(0 2px 12px rgba(180,210,255,0.45));
    animation: planeJourney 2.4s cubic-bezier(0.4,0.0,0.2,1) 0.9s forwards;
    z-index: 30;
    pointer-events: none;
  }

  @keyframes planeJourney {
    0%   { transform: translate(-260px,-50%) rotate(-5deg)  scale(1);    opacity:0; }
    5%   { opacity:1; }
    30%  { transform: translate(40px,  calc(-50% - 18px)) rotate(-8deg)  scale(1);    opacity:1; }
    60%  { transform: translate(220px, calc(-50% - 10px)) rotate(-5deg)  scale(1);    opacity:1; }
    78%  { transform: translate(310px, calc(-50% + 5px))  rotate(8deg)   scale(0.85); opacity:1; }
    90%  { transform: translate(355px, calc(-50% + 22px)) rotate(15deg)  scale(0.55); opacity:1; }
    100% { transform: translate(372px, calc(-50% + 34px)) rotate(10deg)  scale(0);    opacity:0; }
  }

  /* FOLDER WRAPPER */
  .folder-wrap {
    position: relative;
    flex-shrink: 0;
    width: 100px;
    height: 90px;
  }

  /* folder body shakes on impact */
  .folder-body-g {
    animation: folderShake 0.4s ease 3.05s;
  }
  @keyframes folderShake {
    0%,100% { transform: translateX(0); }
    20%     { transform: translateX(-4px) rotate(-1deg); }
    40%     { transform: translateX(4px)  rotate(1deg); }
    60%     { transform: translateX(-3px); }
    80%     { transform: translateX(3px); }
  }

  /* flap opens when plane arrives */
  .folder-flap {
    transform-origin: 50% 0%;
    transform-box: fill-box;
    animation: flapOpen 0.3s ease-in 2.9s forwards;
  }
  @keyframes flapOpen {
    0%   { transform: rotateX(0deg); }
    100% { transform: rotateX(-55deg); }
  }

  /* glow burst */
  .folder-wrap::after {
    content: "";
    position: absolute;
    inset: -16px;
    border-radius: 20px;
    background: radial-gradient(circle, rgba(80,130,255,0.5) 0%, transparent 70%);
    opacity: 0;
    pointer-events: none;
    animation: glowBurst 0.55s ease 3s forwards;
  }
  @keyframes glowBurst {
    0%   { opacity:0; transform:scale(0.7); }
    45%  { opacity:1; transform:scale(1.3); }
    100% { opacity:0; transform:scale(1.7); }
  }

  /* FOLDER FLIES AWAY after plane enters */
  /* starts normal, then shoots up-right and fades out */
  .folder-svg {
    animation: folderFlyAway 0.7s cubic-bezier(0.4,0,0.6,1) 3.4s forwards;
    transform-origin: center center;
  }
  @keyframes folderFlyAway {
    0%   { transform: translate(0,0) rotate(0deg) scale(1); opacity:1; }
    30%  { transform: translate(20px,-30px) rotate(-8deg) scale(1.05); opacity:1; }
    70%  { transform: translate(80px,-120px) rotate(-20deg) scale(0.8); opacity:0.6; }
    100% { transform: translate(160px,-220px) rotate(-30deg) scale(0.4); opacity:0; }
  }

  /* TAGLINE */
  .tagline {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, 60px);
    white-space: nowrap;
    font-family: "DM Sans", sans-serif;
    font-size: 15px;
    color: #555;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    opacity: 0;
    animation: fadeUp 0.7s ease 4.2s forwards;
    z-index: 100;
  }
  @keyframes fadeUp {
    from { opacity:0; transform:translate(-50%, 68px); }
    to   { opacity:1; transform:translate(-50%, 60px); }
  }

  /* REPLAY */
  .replay {
    position: absolute;
    bottom: -96px;
    left: 50%;
    transform: translateX(-50%);
    background: none;
    border: 1px solid #1e1e2e;
    color: #3a3a5a;
    font-family: "DM Sans", sans-serif;
    font-size: 12px;
    padding: 7px 20px;
    border-radius: 999px;
    cursor: pointer;
    white-space: nowrap;
    opacity: 0;
    animation: fadeUp 0.4s ease 4.6s forwards;
    transition: border-color 0.2s, color 0.2s;
  }
  .replay:hover { border-color: #555; color: #aaa; }
</style>
</head>
